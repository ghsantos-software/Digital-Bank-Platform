services:

  postgres:
    image: postgres:16-alpine
    container_name: dbp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-digitalbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitalbank123}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digitalbank}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dbp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: dbp-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: dbp-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: ${POSTGRES_USER:-digitalbank}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-digitalbank123}
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q UP <&3 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  prometheus:
    image: prom/prometheus:latest
    container_name: dbp-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: dbp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

  discovery-service:
    build: ./discovery-service
    container_name: dbp-discovery
    restart: unless-stopped
    mem_limit: 384m
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  config-server:
    build: ./config-server
    container_name: dbp-config-server
    restart: unless-stopped
    mem_limit: 384m
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
    ports:
      - "8888:8888"
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: dbp-api-gateway
    restart: unless-stopped
    mem_limit: 512m
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/digital-bank/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: dbp-user-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      POSTGRES_USER: ${POSTGRES_USER:-digitalbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitalbank123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/digital-bank/protocol/openid-connect/certs
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  account-service:
    build: ./account-service
    container_name: dbp-account-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      POSTGRES_USER: ${POSTGRES_USER:-digitalbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitalbank123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/digital-bank/protocol/openid-connect/certs
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  transaction-service:
    build: ./transaction-service
    container_name: dbp-transaction-service
    restart: unless-stopped
    mem_limit: 512m
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
      POSTGRES_USER: ${POSTGRES_USER:-digitalbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitalbank123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/digital-bank/protocol/openid-connect/certs
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  postgres_data:
  grafana_data:

networks:
  default:
    name: dbp-network
