spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost/not-used-in-tests
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

feign:
  client:
    config:
      default:
        connectTimeout: 1000
        readTimeout: 1000
